<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>情感 AI 聊天</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="chat-header">
    <div class="avatar" id="avatarEmoji">🦋</div>
    <div class="info">
      <div class="name" id="aiName">小暖</div>
      <div class="mood" id="aiMood"><span>😌</span> <span>平静</span></div>
    </div>
    <a href="/settings.html" class="header-btn" title="设置">⚙️</a>
    <button class="header-btn" id="clearBtn" title="清空对话">🗑️</button>
  </div>

  <div id="emptyState" class="empty-state">
    <div class="icon">🦋</div>
    <h2>开始聊天</h2>
    <p>和我聊聊吧，我会记住你说的话，慢慢了解你。</p>
  </div>

  <div class="chat-messages" id="chatMessages"></div>

  <div class="chat-input">
    <textarea id="inputField" rows="1" placeholder="输入消息..." maxlength="2000"></textarea>
    <button class="send-btn" id="sendBtn" disabled>➤</button>
  </div>

  <script src="app.js"></script>
</body>
</html>
