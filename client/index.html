<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Emotion AI</title>
<style>
:root{--primary:#6366f1;--primary-dark:#4f46e5}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"Inter",-apple-system,sans-serif;background:#f8fafc;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.wrap{display:flex;max-width:960px;width:100%;min-height:580px;background:#fff;border-radius:20px;overflow:hidden;box-shadow:0 25px 50px -12px rgba(0,0,0,.15)}
.left{flex:1;background:linear-gradient(135deg,#4f46e5,#7c3aed);color:#fff;padding:60px 48px;display:flex;flex-direction:column;justify-content:center}
.left h1{font-size:36px;font-weight:700;margin-bottom:8px}
.left .tagline{font-size:17px;opacity:.9;margin-bottom:32px}
.left .features{list-style:none}
.left .features li{font-size:15px;margin-bottom:16px;display:flex;align-items:center;gap:10px}
.left .features li span{font-size:20px}
.right{flex:1;padding:60px 48px;display:flex;flex-direction:column;justify-content:center}
.right h2{font-size:24px;margin-bottom:6px;color:#1e293b}
.right .sub{color:#94a3b8;font-size:14px;margin-bottom:24px}
.tabs{display:flex;margin-bottom:24px;gap:0;background:#f1f5f9;border-radius:10px;padding:4px}
.tab{flex:1;text-align:center;padding:10px;cursor:pointer;border-radius:8px;font-size:14px;font-weight:500;color:#64748b;border:none;background:none;transition:.2s}
.tab.active{background:#fff;color:var(--primary);box-shadow:0 1px 3px rgba(0,0,0,.08)}
.form{display:none}
.form.active{display:block}
.form-group{margin-bottom:12px}
.form-group label{display:block;font-size:13px;font-weight:500;color:#64748b;margin-bottom:4px}
input{width:100%;padding:12px 14px;border:1.5px solid #e2e8f0;border-radius:10px;font-size:15px;outline:none;transition:.2s}
input:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(99,102,241,.1)}
.btn{width:100%;padding:14px;margin-top:8px;border:none;border-radius:10px;font-size:16px;font-weight:600;cursor:pointer;transition:.2s;background:var(--primary);color:#fff}
.btn:hover{background:var(--primary-dark);transform:translateY(-1px)}
.btn:disabled{opacity:.6;cursor:not-allowed;transform:none}
.msg{font-size:13px;margin-top:8px;min-height:20px}
.msg.error{color:#ef4444}
.msg.success{color:#22c55e}
@media(max-width:768px){.wrap{flex-direction:column}.left{padding:40px 32px}.right{padding:40px 32px}}
</style>
</head>
<body>
<div class="wrap">
<div class="left">
<h1>🤖 Emotion AI</h1>
<p class="tagline">创建你自己的 AI 情感机器人</p>
<ul class="features">
<li><span>🧠</span> 长期记忆，越聊越懂你</li>
<li><span>💕</span> 情绪感知，回应更贴心</li>
<li><span>🎭</span> 自定义人格，独一无二</li>
<li><span>📱</span> 扫码接入微信</li>
</ul>
</div>
<div class="right">
<div class="tabs">
<button class="tab active" onclick="switchTab('login')">登录</button>
<button class="tab" onclick="switchTab('reg')">注册</button>
</div>
<form class="form active" id="loginForm" onsubmit="login();return false">
<div class="form-group"><label>邮箱</label><input type="email" id="loginEmail" placeholder="name@example.com" required></div>
<div class="form-group"><label>密码</label><input type="password" id="loginPassword" placeholder="输入密码" required></div>
<div class="msg" id="loginMsg"></div>
<button class="btn" type="submit" id="loginBtn">登录</button>
</form>
<form class="form" id="regForm" onsubmit="register();return false">
<div class="form-group"><label>邮箱</label><input type="email" id="regEmail" placeholder="name@example.com" required></div>
<div class="form-group"><label>密码</label><input type="password" id="regPassword" placeholder="至少6位" required minlength="6"></div>
<div class="form-group"><label>确认密码</label><input type="password" id="regConfirm" placeholder="再次输入" required></div>
<div class="msg" id="regMsg"></div>
<button class="btn" type="submit" id="regBtn">注册</button>
</form>
</div>
</div>
<script>
function switchTab(t){
document.querySelectorAll(".tab").forEach(e=>e.classList.remove("active"));
event.target.classList.add("active");
document.getElementById("loginForm").classList.toggle("active",t==="login");
document.getElementById("regForm").classList.toggle("active",t==="reg");
document.getElementById("loginMsg").textContent="";document.getElementById("regMsg").textContent="";
}
function show(el,text,type){el.textContent=text;el.className="msg "+type}
function loading(btn,on){btn.disabled=on;btn.textContent=on?"处理中...":(btn.id==="loginBtn"?"登录":"注册")}
async function login(){
const e=document.getElementById("loginEmail").value.trim(),p=document.getElementById("loginPassword").value;
const msg=document.getElementById("loginMsg");
if(!e||!p){show(msg,"请填写完整","error");return false}
if(!/^.+@.+$/.test(e)){show(msg,"邮箱格式不正确","error");return false}
loading(document.getElementById("loginBtn"),true);
try{
const r=await fetch("/api/auth/login",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({email:e,password:p})});
const d=await r.json();
if(d.ok){show(msg,"登录成功","success");localStorage.setItem("token",d.token);localStorage.setItem("user",JSON.stringify(d.user));setTimeout(()=>location=d.user.role==="admin"?"/admin.html":"/dashboard.html",300)}
else{show(msg,d.error,"error");loading(document.getElementById("loginBtn"),false)}
}catch{show(msg,"网络错误","error");loading(document.getElementById("loginBtn"),false)}
return false
}
async function register(){
const e=document.getElementById("regEmail").value.trim(),p=document.getElementById("regPassword").value,c=document.getElementById("regConfirm").value;
const msg=document.getElementById("regMsg");
if(!e||!p||!c){show(msg,"请填写完整","error");return false}
if(!/^.+@.+$/.test(e)){show(msg,"邮箱格式不正确","error");return false}
if(p.length<6){show(msg,"密码至少6位","error");return false}
if(p!==c){show(msg,"两次密码不一致","error");return false}
loading(document.getElementById("regBtn"),true);
try{
const r=await fetch("/api/auth/register",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({email:e,password:p})});
const d=await r.json();
if(d.ok){show(msg,"注册成功","success");localStorage.setItem("token",d.token);localStorage.setItem("user",JSON.stringify(d.user));setTimeout(()=>location=d.user.role==="admin"?"/admin.html":"/dashboard.html",500)}
else{show(msg,d.error,"error");loading(document.getElementById("regBtn"),false)}
}catch{show(msg,"网络错误","error");loading(document.getElementById("regBtn"),false)}
return false
}
</script>
<footer style="text-align:center;padding:24px;color:#94a3b8;font-size:13px">© 2026 Emotion AI</footer>
</body>
</html>
