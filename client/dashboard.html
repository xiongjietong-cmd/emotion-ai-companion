<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>用户后台 — Emotion AI</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, sans-serif; background: #f5f5f5; }
.header { background: linear-gradient(135deg, #667eea, #764ba2); color: #fff; padding: 16px 24px; display: flex; justify-content: space-between; align-items: center; }
.header h2 { font-size: 18px; }
.btn { padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: bold; }
.btn-primary { background: #ffd700; color: #333; }
.btn-danger { background: #e74c3c; color: #fff; }
.btn-sm { padding: 6px 12px; font-size: 12px; }
.container { max-width: 800px; margin: 20px auto; padding: 0 16px; }
.card { background: #fff; border-radius: 12px; padding: 20px; margin-bottom: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
.card h3 { margin-bottom: 12px; font-size: 16px; }
input, textarea { width: 100%; padding: 10px; margin: 6px 0; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; }
.flex { display: flex; gap: 10px; align-items: center; }
.bot-list { display: grid; gap: 12px; }
.bot-card { border: 1px solid #eee; border-radius: 8px; padding: 16px; cursor: pointer; transition: 0.2s; }
.bot-card:hover { border-color: #667eea; }
.bot-card.active { border-color: #667eea; background: #f0f0ff; }

.chat { border: 1px solid #eee; border-radius: 8px; height: 300px; overflow-y: auto; padding: 12px; background: #fafafa; margin-top: 12px; }
.chat .msg { margin-bottom: 8px; padding: 8px 12px; border-radius: 12px; max-width: 80%; }
.chat .user { background: #667eea; color: #fff; margin-left: auto; }
.chat .assistant { background: #e8e8e8; color: #333; }
.chat-input { display: flex; gap: 8px; margin-top: 8px; }
.chat-input input { flex: 1; }
.loading { opacity: 0.5; }
</style>
</head>
<body>
<div class="header">
  <h2>🤖 我的机器人</h2>
  <button class="btn btn-danger btn-sm" onclick="logout()">退出</button>
</div>
<div class="container">
  <div class="card">
    <h3>创建新机器人</h3>
    <div class="flex">
      <input id="botName" placeholder="机器人名字" style="flex:1">
      <button class="btn btn-primary" onclick="createBot()">创建</button>
    </div>
  </div>
  <div class="bot-list" id="botList"></div>
  <div id="botDetail" class="card" style="display:none">
    <h3 id="detailName"></h3>
    <div class="flex">
      <input id="personaName" placeholder="名字">
      <input id="personaWarmth" placeholder="温暖度 0-1" type="number" min="0" max="1" step="0.1" style="width:100px">
      <button class="btn btn-primary btn-sm" onclick="savePersonality()">保存</button>
    </div>
    <div style="margin-top:12px;padding:12px;background:#f0f4ff;border-radius:8px;border:1px solid #d0d8ff">
    <strong>📱 微信扫码绑定</strong>
    <ol style="margin:8px 0;font-size:13px;color:#444;padding-left:18px;">
      <li>运行扫码登录<br><code style="background:#e8e8e8;padding:2px 6px;border-radius:3px;">openclaw channels login --channel openclaw-weixin</code></li>
      <li>手机微信扫码确认</li>
      <li>运行同步命令<br><code style="background:#e8e8e8;padding:2px 6px;border-radius:3px;">node sync-wechat.js <span id="syncBotId">?</span></code></li>
    </ol>
    <button class="btn btn-primary btn-sm" onclick="toggleWechatHelp()">了解更多</button>
  </div>
  
  <div id="chatArea" style="display:none">
    <div class="chat" id="chatBox"></div>
    <div class="chat-input">
      <input id="chatInput" placeholder="输入消息..." onkeydown="if(event.key==='Enter')sendChat()">
      <button class="btn btn-primary btn-sm" onclick="sendChat()">发送</button>
    </div>
  </div>
</div>
</div>
<script>
const API = '';
const token = localStorage.getItem('token');
if (!token) window.location = '/';
async function api(url, opts = {}) {
  const res = await fetch(API + url, { ...opts, headers: { ...opts.headers, 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' } });
  return res.json();
}
async function loadBots() {
  const d = await api('/api/bots');
  const el = document.getElementById('botList');
  el.innerHTML = d.bots.map(b => '<div class="bot-card" onclick="selectBot(' + b.id + ')"><strong>' + b.name + '</strong><br><small>ID: ' + b.id + '</small></div>').join('');
}
async function createBot() {
  const name = document.getElementById('botName').value;
  await api('/api/bots', { method:'POST', body:JSON.stringify({name}) });
  document.getElementById('botName').value = '';
  loadBots();
}
let currentBot = null;
async function selectBot(id) {
  currentBot = id;
  const d = await api('/api/bots/' + id + '/public');
  document.getElementById('botDetail').style.display = 'block';
  document.getElementById('detailName').textContent = d.name;
  document.getElementById('personaName').value = d.personality.name || '';
  document.getElementById('personaWarmth').value = d.personality.traits?.warmth || 0.8;
  document.getElementById('chatArea').style.display = 'block';
  document.getElementById('chatBox').innerHTML = '';
  document.getElementById('syncBotId').textContent = id;
}
async function savePersonality() {
  const p = { name: document.getElementById('personaName').value, traits: { warmth: parseFloat(document.getElementById('personaWarmth').value) } };
  await api('/api/bots/' + currentBot, { method:'PUT', body:JSON.stringify({personality: p}) });
  alert('已保存');
}
function toggleWechatHelp() { alert('1. 在终端运行: openclaw channels login --channel openclaw-weixin\n2. 扫码确认\n3. 运行: node sync-wechat.js ' + currentBot + '\n4. 桥接自动接管'); }

async function sendChat() {
  const input = document.getElementById('chatInput');
  const text = input.value.trim();
  if (!text || !currentBot) return;
  input.value = '';
  const box = document.getElementById('chatBox');
  box.innerHTML += '<div class="msg user">' + text + '</div>';
  box.innerHTML += '<div class="msg assistant loading">...</div>';
  box.scrollTop = box.scrollHeight;
  const res = await api('/api/chat/' + currentBot, { method:'POST', body:JSON.stringify({text}) });
  const last = box.querySelector('.loading');
  if (last) last.outerHTML = '<div class="msg assistant">' + (res.reply || res.error || 'Error') + '</div>';
  box.scrollTop = box.scrollHeight;
}
function logout() { localStorage.clear(); window.location = '/'; }
loadBots();
</script>
</body>
</html>
