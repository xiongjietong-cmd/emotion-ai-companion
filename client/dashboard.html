<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:sans-serif;background:#f5f5f5}
.header{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;padding:16px 24px;display:flex;justify-content:space-between}
.btn{padding:10px 20px;border:none;border-radius:8px;cursor:pointer;font-weight:bold}
.btn-primary{background:#ffd700}
.btn-danger{background:#e74c3c;color:#fff}
.container{max-width:800px;margin:20px auto;padding:0 16px}
.card{background:#fff;border-radius:12px;padding:20px;margin-bottom:16px;box-shadow:0 2px 8px rgba(0,0,0,.06)}
input{padding:10px;border:1px solid #ddd;border-radius:6px;font-size:14px}
.flex{display:flex;gap:10px;align-items:center}
.bot-card{display:flex;justify-content:space-between;align-items:center;padding:12px;border:1px solid #eee;border-radius:8px;margin-bottom:8px;cursor:pointer}
.bot-card:hover,.bot-card.active{border-color:#667eea;background:#f0f0ff}
.chat-box{border:1px solid #eee;border-radius:8px;height:300px;overflow-y:auto;padding:12px;background:#fafafa;margin-top:12px}
.msg{margin-bottom:8px;padding:8px 12px;border-radius:12px;max-width:80%}
.msg.user{background:#667eea;color:#fff;margin-left:auto}
.msg.assistant{background:#e8e8e8}
.chat-row{display:flex;gap:8px;margin-top:8px}
.chat-row input{flex:1}
</style>
</head>
<body>
<div class="header"><h2>Dashboard</h2><button class="btn btn-danger" onclick="logout()">退出</button></div>
<div class="container">
<div class="card"><h3>创建机器人</h3><div class="flex"><input id="botName" placeholder="机器人名字" style="flex:1"><button class="btn btn-primary" onclick="createBot()">创建</button></div><div style="background:#f0f4ff;border:1px solid #d0d8ff;border-radius:8px;padding:12px;margin-top:12px"><strong>微信绑定</strong><div style="margin-top:8px"><button class="btn btn-primary" onclick="startQR()">扫码绑定</button><span id="qrStatus" style="font-size:12px;margin-left:8px"></span></div><div id="qrBox" style="display:none;margin-top:8px;text-align:center"><img id="qrImg" style="width:200px;height:200px;border:1px solid #eee"><p style="font-size:12px;color:#666">手机微信扫码，自动绑定</p></div></div><span id="wxStatus" style="font-size:12px"></span></div></div></div></div>
<div id="botList"></div>
<div id="detail" class="card" style="display:none"><h3 id="detailName"></h3><div class="flex" style="margin-bottom:12px"><input id="pName" placeholder="名字"><input id="pWarmth" type="number" min="0" max="1" step="0.1" value="0.8" style="width:80px"><button class="btn btn-primary" onclick="saveP()" style="font-size:12px">保存</button></div>
<div class="chat-box" id="chatBox"></div>
<div class="chat-row"><input id="chatInput" placeholder="输入消息"><button class="btn btn-primary" onclick="send()" style="font-size:12px">发送</button></div></div>
</div>
<script>
const T=localStorage.getItem("token");if(!T)location="/";
async function A(u,o){o=o||{};o.headers={...o.headers,Authorization:"Bearer "+T,"Content-Type":"application/json"};const r=await fetch(u,o);return r.json()}
async function L(){const d=await A("/api/bots");document.getElementById("botList").innerHTML=d.bots.map(b=>'<div class="bot-card" onclick="S('+b.id+')"><strong>'+b.name+'</strong><span>ID:'+b.id+'</span></div>').join("")}
async function createBot(){const n=document.getElementById("botName").value;if(!n)return;await A("/api/bots",{method:"POST",body:JSON.stringify({name:n})});document.getElementById("botName").value="";L()}
let C=null;
async function S(id){C=id;const d=await A("/api/bots/"+id+"/public");document.getElementById("detail").style.display="block";document.getElementById("detailName").textContent=d.name;document.getElementById("pName").value=d.personality?.name||"";document.getElementById("chatBox").innerHTML=""}
async function saveP(){const p={name:document.getElementById("pName").value,traits:{warmth:parseFloat(document.getElementById("pWarmth").value)}};await A("/api/bots/"+C,{method:"PUT",body:JSON.stringify({personality:p})});alert("saved")}
async function send(){const t=document.getElementById("chatInput").value.trim();if(!t)return;document.getElementById("chatInput").value="";const b=document.getElementById("chatBox");b.innerHTML+='<div class="msg user">'+t+'</div><div class="msg assistant" id="load">...</div>';b.scrollTop=b.scrollHeight;const r=await A("/api/chat/"+C,{method:"POST",body:JSON.stringify({text:t})});document.getElementById("load").outerHTML='<div class="msg assistant">'+(r.reply||r.error)+'</div>';b.scrollTop=b.scrollHeight}
let qrS=null;async function startQR(){document.getElementById("qrStatus").textContent="生成中";const r=await fetch("http://localhost:3002/start",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({botId:C})});const d=await r.json();if(!d.ok){alert(d.error);return}qrS=d.sessionId;pollQR()}function pollQR(){(async function loop(){const r=await fetch("http://localhost:3002/status?session="+qrS);const d=await r.json();if(d.status==="done"){document.getElementById("qrStatus").textContent="已绑定";document.getElementById("qrBox").style.display="none";await A("/api/bots/"+C+"/wechat-bind",{method:"POST",body:JSON.stringify({token:d.token,wxUserId:d.wxUserId})});return}if(d.qrText){document.getElementById("qrBox").style.display="block";document.getElementById("qrImg").src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data="+encodeURIComponent(d.qrText);document.getElementById("qrStatus").textContent="等待扫码"}setTimeout(loop,2000)})()}async function bindWx(){const t=document.getElementById("wxToken").value;if(!t)return;await bindWechat(t,"")}
L();
</script>
</body>
</html>
