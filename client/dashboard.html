<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>情感 AI 控制台</title>
<style>
:root{--bg:#f6f7fb;--panel:#fff;--line:#e5e7eb;--text:#1f2937;--muted:#6b7280;--primary:#2563eb;--ok:#15803d;--bad:#b91c1c}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
header{height:58px;background:var(--panel);border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;padding:0 22px}
h1{font-size:18px;margin:0}.layout{display:grid;grid-template-columns:320px 1fr;gap:16px;max-width:1280px;margin:18px auto;padding:0 16px}
.panel{background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:16px;margin-bottom:14px}.panel h2{font-size:15px;margin:0 0 12px}
.stats,.usage-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}.stat,.usage-item{background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:13px}.stat b,.usage-item b{display:block;font-size:22px}.stat span,.usage-item span,.hint{color:var(--muted);font-size:13px}
button{border:0;border-radius:7px;padding:9px 12px;cursor:pointer;background:var(--primary);color:#fff;font-weight:600}button.secondary{background:#eef2ff;color:var(--primary)}button.danger{background:#fee2e2;color:var(--bad)}
input,textarea,select{width:100%;border:1px solid var(--line);border-radius:7px;padding:9px 10px;font-size:14px;background:#fff}textarea{resize:vertical;min-height:76px}label{font-size:12px;color:var(--muted);display:block;margin:10px 0 5px}
.row{display:grid;grid-template-columns:1fr 1fr;gap:10px}.actions{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-top:12px}
.bot{border:1px solid var(--line);border-radius:8px;padding:12px;margin-bottom:10px;cursor:pointer}.bot.active{border-color:var(--primary);background:#eef2ff}.tabs{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}.tab{background:#f3f4f6;color:var(--muted)}.tab.active{background:var(--primary);color:#fff}.view{display:none}.view.active{display:block}
.badge{font-size:12px;border-radius:999px;padding:2px 8px;background:#f3f4f6;color:var(--muted);white-space:nowrap}.badge.ok{background:#dcfce7;color:var(--ok)}.badge.bad{background:#fee2e2;color:var(--bad)}
.chat{height:320px;overflow:auto;border:1px solid var(--line);border-radius:8px;background:#fafafa;padding:12px}.msg{max-width:82%;padding:9px 11px;border-radius:10px;margin:0 0 8px}.msg.user{background:var(--primary);color:#fff;margin-left:auto}.msg.assistant{background:#e5e7eb}.preset-list{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}.preset{border:1px solid var(--line);border-radius:8px;padding:10px;background:#fafafa;cursor:pointer}.preset b{display:block;font-size:13px}.memory{display:flex;justify-content:space-between;gap:12px;border-bottom:1px solid #f3f4f6;padding:9px 0}.qr{width:210px;height:210px;border:1px solid var(--line);border-radius:8px;background:#fff}
a{color:var(--primary);text-decoration:none}@media(max-width:920px){.layout{grid-template-columns:1fr}.stats,.usage-grid{grid-template-columns:repeat(2,1fr)}.row,.preset-list{grid-template-columns:1fr}}
</style>
</head>
<body>
<header>
  <h1>情感 AI 控制台</h1>
  <div class="actions" style="margin:0"><a href="/admin.html" class="hint">管理后台</a><button class="secondary" onclick="logout()">退出</button></div>
</header>

<div class="layout">
  <aside>
    <div class="panel">
      <h2>创建机器人</h2>
      <input id="newBotName" placeholder="例如：阿暖">
      <div class="actions"><button onclick="createBot()">创建</button></div>
    </div>
    <div class="panel">
      <h2>我的机器人</h2>
      <div id="botList" class="hint">加载中...</div>
    </div>
  </aside>

  <main>
    <div class="stats">
      <div class="stat"><b id="statBots">0</b><span>机器人</span></div>
      <div class="stat"><b id="statIn">0</b><span>收到消息</span></div>
      <div class="stat"><b id="statOut">0</b><span>发出消息</span></div>
      <div class="stat"><b id="statWx">0</b><span>微信绑定</span></div>
    </div>
    <div id="usagePanel" class="panel hint">套餐与额度加载中...</div>
    <div id="empty" class="panel hint">请选择或创建一个机器人。</div>
    <div id="detail" class="panel" style="display:none">
      <h2 id="botTitle">机器人</h2>
      <div class="tabs">
        <button class="tab active" data-view="settings" onclick="showView('settings')">个性</button>
        <button class="tab" data-view="memory" onclick="showView('memory')">记忆</button>
        <button class="tab" data-view="chat" onclick="showView('chat')">测试聊天</button>
        <button class="tab" data-view="wechat" onclick="showView('wechat')">微信</button>
      </div>

      <section id="view-settings" class="view active">
        <div class="row">
          <div><label>后台显示名</label><input id="botName"></div>
          <div><label>AI 自称</label><input id="personaName"></div>
        </div>
        <label>关系定位</label><input id="relationshipPosition" placeholder="朋友、恋人感陪伴、损友、成熟搭子">
        <label>核心人设</label><textarea id="customPersona" placeholder="这个 AI 的性格、边界、与你的相处感"></textarea>
        <label>说话方式</label><input id="speakingStyle" placeholder="短句，口语化，少说教">
        <label>背景设定</label><textarea id="background" placeholder="长期相处背景，可为空"></textarea>
        <label>禁发词汇</label><textarea id="blockedTerms" placeholder="每行一个词，例如：宝贝"></textarea>
        <label>说话样例</label><textarea id="speechExamples" placeholder="每行一句它可以参考的说话方式"></textarea>
        <div class="row">
          <div><label>温柔度 <span id="warmthVal"></span></label><input id="warmth" type="range" min="0" max="1" step="0.1"></div>
          <div><label>幽默感 <span id="humorVal"></span></label><input id="humor" type="range" min="0" max="1" step="0.1"></div>
          <div><label>直率度 <span id="directnessVal"></span></label><input id="directness" type="range" min="0" max="1" step="0.1"></div>
          <div><label>共情力 <span id="empathyVal"></span></label><input id="empathy" type="range" min="0" max="1" step="0.1"></div>
        </div>
        <div class="actions"><button onclick="saveSettings()">保存性格</button><button class="danger" onclick="deleteBot()">删除机器人</button><span id="saveHint" class="hint"></span></div>
        <div class="panel" style="margin-top:14px">
          <h2>人格预设</h2>
          <div id="personaPresetList" class="preset-list hint">加载中...</div>
        </div>
      </section>

      <section id="view-memory" class="view">
        <div id="memoryList" class="hint">加载中...</div>
        <div class="row" style="margin-top:12px">
          <input id="memoryKey" placeholder="关键词，例如：生日">
          <input id="memoryValue" placeholder="记忆内容">
        </div>
        <div class="actions"><button onclick="addMemory()">添加记忆</button></div>
      </section>

      <section id="view-chat" class="view">
        <div id="chatBox" class="chat"></div>
        <div class="actions"><input id="chatInput" placeholder="输入一句话测试"><button onclick="sendChat()">发送</button></div>
      </section>

      <section id="view-wechat" class="view">
        <p class="hint">扫码后，这个微信账号会绑定到当前机器人。</p>
        <div id="wxStatusPanel" class="panel hint">加载微信状态...</div>
        <div class="actions"><button onclick="startQR()">生成绑定二维码</button><button class="secondary" onclick="cancelQR()">取消扫码</button><button class="secondary" onclick="loadWechatStatus()">刷新状态</button><button class="secondary" onclick="reconnectWechat()">手动重连</button><span id="qrStatus" class="hint"></span></div>
        <div id="qrBox" style="display:none;margin-top:12px"><img id="qrImg" class="qr" alt="微信绑定二维码"><p class="hint">用手机微信扫码完成绑定。</p></div>
        <div id="connectLinkPanel" class="panel" style="display:none;margin-top:12px">
          <label>微信对接链接</label>
          <div class="actions" style="margin-top:0"><input id="connectLinkInput" readonly><button class="secondary" onclick="copyConnectLink()">复制链接</button></div>
          <p class="hint">复制后用微信打开这个链接，也可以完成对接。</p>
        </div>
      </section>
    </div>
  </main>
</div>

<script>
let token = localStorage.getItem("token");
if (!token) location = "/";
const QR_BASE = (location.hostname === "localhost" || location.hostname === "127.0.0.1") ? "http://" + location.hostname + ":3002" : location.protocol + "//" + location.hostname + ":3002";
let bots = [];
let current = null;
let personaPresets = [];
let qrSession = null;
let qrPollTimer = null;
let currentConnectLink = "";

async function api(url, options = {}) {
  options.headers = { ...(options.headers || {}), Authorization:"Bearer " + token, "Content-Type":"application/json" };
  const res = await fetch(url, options);
  const data = await res.json().catch(() => ({}));
  if (data.code === "ACCOUNT_BLACKLISTED" || data.code === "ACCOUNT_DELETED") {
    localStorage.removeItem("token");
    location = "/";
    throw new Error(data.error || "账号状态异常");
  }
  if (!res.ok || data.ok === false) throw new Error(data.error || "请求失败");
  return data;
}

function logout(){ localStorage.removeItem("token"); location="/"; }

function showView(name){
  document.querySelectorAll(".tab").forEach((tab)=>tab.classList.toggle("active", tab.dataset.view===name));
  document.querySelectorAll(".view").forEach((view)=>view.classList.toggle("active", view.id==="view-"+name));
  if (name === "memory") loadMemories();
  if (name === "wechat") loadWechatStatus();
}

async function loadUsage(){
  try {
    const data = await api("/api/me/usage");
    renderUsage(data);
  } catch(error) {
    document.getElementById("usagePanel").textContent = "额度加载失败：" + error.message;
  }
}

function renderUsage(data){
  const plan = data.plan || {};
  const usage = data.usage || {};
  const limits = data.limits || {};
  const remaining = data.remaining || {};
  const invite = data.invite || {};
  const baseMonthlyMessageLimit = Number(limits.baseMonthlyMessageLimit || 0);
  const bonusMessageQuota = Number(limits.bonusMessageQuota || 0);
  document.getElementById("usagePanel").innerHTML = `
    <div class="usage-grid">
      <div class="usage-item"><b>${escapeHtml(plan.name || plan.code || "-")}</b><span>当前套餐</span></div>
      <div class="usage-item"><b>${Number(usage.botCount || 0)} / ${Number(limits.botLimit || 0)}</b><span>机器人</span></div>
      <div class="usage-item"><b>${Number(usage.wechatCount || 0)} / ${Number(limits.wechatLimit || 0)}</b><span>微信绑定</span></div>
      <div class="usage-item"><b>${Number(remaining.messages || 0)}</b><span>本月剩余消息</span></div>
    </div>
    <p class="hint">邀请码：<b>${escapeHtml(invite.code || "-")}</b>，基础额度 ${baseMonthlyMessageLimit}，邀请奖励 ${bonusMessageQuota}</p>`;
}

async function loadBots(){
  const data = await api("/api/bots");
  bots = data.bots || [];
  if (current) current = bots.find((bot)=>bot.id===current.id) || bots[0] || null;
  else current = bots[0] || null;
  renderBots();
  selectCurrent();
}

function renderBots(){
  document.getElementById("statBots").textContent = bots.length;
  document.getElementById("statIn").textContent = bots.reduce((sum, bot)=>sum + Number(bot.msg_in || 0), 0);
  document.getElementById("statOut").textContent = bots.reduce((sum, bot)=>sum + Number(bot.msg_out || 0), 0);
  document.getElementById("statWx").textContent = bots.filter((bot)=>bot.wechatStatus?.isBound).length;
  document.getElementById("botList").innerHTML = bots.length ? bots.map((bot)=>`<div class="bot ${current?.id===bot.id?"active":""}" onclick="selectBot(${bot.id})"><b>${escapeHtml(bot.name)}</b><span class="hint">${bot.wechatStatus?.label || "未绑定"} · 记忆 ${Number(bot.memory_count || 0)}</span></div>`).join("") : `<p class="hint">还没有机器人。</p>`;
}

function selectBot(id){ current = bots.find((bot)=>bot.id===id) || null; renderBots(); selectCurrent(); }

function selectCurrent(){
  document.getElementById("empty").style.display = current ? "none" : "block";
  document.getElementById("detail").style.display = current ? "block" : "none";
  if (!current) return;
  const p = parsePersonality(current.personality);
  document.getElementById("botTitle").textContent = current.name;
  document.getElementById("botName").value = current.name || "";
  document.getElementById("personaName").value = p.identity?.aiName || p.name || "";
  document.getElementById("relationshipPosition").value = p.relationshipPosition || "";
  document.getElementById("customPersona").value = p.customPersona || "";
  document.getElementById("speakingStyle").value = p.speakingStyle || "";
  document.getElementById("background").value = p.background || "";
  document.getElementById("blockedTerms").value = Array.isArray(p.blockedTerms) ? p.blockedTerms.join("\n") : "";
  document.getElementById("speechExamples").value = Array.isArray(p.speechExamples) ? p.speechExamples.join("\n") : "";
  const traits = p.traits || {};
  for (const id of ["warmth","humor","directness","empathy"]) document.getElementById(id).value = traits[id] ?? 0.6;
  updateRangeLabels();
  loadMemories();
  loadWechatStatus();
}

function parsePersonality(raw){
  if (!raw) return {};
  if (typeof raw === "object") return raw;
  try { return JSON.parse(raw); } catch { return {}; }
}

function updateRangeLabels(){
  for (const id of ["warmth","humor","directness","empathy"]) document.getElementById(id+"Val").textContent = document.getElementById(id).value;
}
document.addEventListener("input", (event)=>{ if (["warmth","humor","directness","empathy"].includes(event.target.id)) updateRangeLabels(); });

function parseBlockedTerms(){
  return document.getElementById("blockedTerms").value.split(/\r?\n|,/).map((item)=>item.trim()).filter(Boolean);
}

function parseSpeechExamples(){
  return document.getElementById("speechExamples").value.split(/\r?\n/).map((item)=>item.trim()).filter(Boolean);
}

async function saveSettings(){
  if (!current) return;
  const personality = {
    name: document.getElementById("personaName").value.trim(),
    identity: { aiName: document.getElementById("personaName").value.trim() },
    relationshipPosition: document.getElementById("relationshipPosition").value.trim(),
    customPersona: document.getElementById("customPersona").value.trim(),
    speakingStyle: document.getElementById("speakingStyle").value.trim(),
    background: document.getElementById("background").value.trim(),
    blockedTerms: parseBlockedTerms(),
    speechExamples: parseSpeechExamples(),
    traits: {
      warmth: Number(document.getElementById("warmth").value),
      humor: Number(document.getElementById("humor").value),
      directness: Number(document.getElementById("directness").value),
      empathy: Number(document.getElementById("empathy").value)
    }
  };
  await api(`/api/bots/${current.id}`, { method:"PUT", body:JSON.stringify({ name: document.getElementById("botName").value.trim() || personality.name || current.name, personality }) });
  document.getElementById("saveHint").textContent = "已保存";
  await loadBots();
}

async function loadPersonaPresets(){
  try {
    const data = await api("/api/persona-presets");
    personaPresets = Array.isArray(data.presets) ? data.presets : [];
    document.getElementById("personaPresetList").innerHTML = personaPresets.map((preset, index)=>`<div class="preset" onclick="applyPersonaPreset(${index})"><b>${escapeHtml(preset.label || preset.id || "预设")}</b><span class="hint">${escapeHtml(preset.description || "")}</span></div>`).join("") || `<p class="hint">暂无预设。</p>`;
  } catch(error) {
    document.getElementById("personaPresetList").textContent = "预设加载失败：" + error.message;
  }
}

function applyPersonaPreset(index){
  const preset = personaPresets[index];
  if (!preset) return;
  const personality = preset.personality || preset;
  const aiName = personality.identity && personality.identity.aiName ? personality.identity.aiName : personality.name || "";
  document.getElementById("personaName").value = aiName;
  document.getElementById("relationshipPosition").value = personality.relationshipPosition || "";
  document.getElementById("customPersona").value = personality.customPersona || "";
  document.getElementById("speakingStyle").value = personality.speakingStyle || "";
  document.getElementById("background").value = personality.background || "";
  document.getElementById("blockedTerms").value = Array.isArray(personality.blockedTerms) ? personality.blockedTerms.join("\n") : "";
  document.getElementById("speechExamples").value = Array.isArray(personality.speechExamples) ? personality.speechExamples.join("\n") : "";
  const traits = personality.traits || {};
  for (const id of ["warmth","humor","directness","empathy"]) document.getElementById(id).value = traits[id] ?? document.getElementById(id).value;
  updateRangeLabels();
}

async function createBot(){
  const name = document.getElementById("newBotName").value.trim() || "阿暖";
  await api("/api/bots", { method:"POST", body:JSON.stringify({ name, personality:{ name, identity:{ aiName:name } } }) });
  document.getElementById("newBotName").value = "";
  await Promise.all([loadBots(), loadUsage()]);
}

async function deleteBot(){
  if (!current) return;
  await api(`/api/bots/${current.id}`, { method:"DELETE" });
  current = null;
  await Promise.all([loadBots(), loadUsage()]);
}

async function loadMemories(){
  if (!current) return;
  const data = await api(`/api/bots/${current.id}/memories`);
  const memories = data.memories || [];
  document.getElementById("memoryList").innerHTML = memories.length ? memories.map((memory)=>`<div class="memory"><div><b>${escapeHtml(memory.fact_key)}</b><div class="hint">${escapeHtml(memory.fact_value)}</div></div><button class="secondary" onclick="deleteMemory('${escapeAttr(memory.fact_key)}')">删除</button></div>`).join("") : `<p class="hint">暂无记忆。</p>`;
}

async function addMemory(){
  if (!current) return;
  const key = document.getElementById("memoryKey").value.trim();
  const value = document.getElementById("memoryValue").value.trim();
  if (!key || !value) return;
  await api(`/api/bots/${current.id}/memories`, { method:"POST", body:JSON.stringify({ key, value }) });
  document.getElementById("memoryKey").value = "";
  document.getElementById("memoryValue").value = "";
  await loadMemories();
}

async function deleteMemory(key){
  await api(`/api/bots/${current.id}/memories`, { method:"DELETE", body:JSON.stringify({ key }) });
  await loadMemories();
}

async function sendChat(){
  if (!current) return;
  const input = document.getElementById("chatInput");
  const text = input.value.trim();
  if (!text) return;
  appendChat("user", text);
  input.value = "";
  const data = await api(`/api/chat/${current.id}`, { method:"POST", body:JSON.stringify({ text, senderId:"web-user" }) });
  const parts = Array.isArray(data.replyParts) ? data.replyParts : [data.reply || ""];
  for (const part of parts.filter(Boolean)) appendChat("assistant", part);
  await loadBots();
}

function appendChat(role, text){
  const box = document.getElementById("chatBox");
  box.insertAdjacentHTML("beforeend", `<div class="msg ${role}">${escapeHtml(text)}</div>`);
  box.scrollTop = box.scrollHeight;
}

async function startQR(){
  if (!current) return;
  const status = document.getElementById("qrStatus");
  status.textContent = "生成中...";
  const res = await fetch(`${QR_BASE}/start?botId=${current.id}`);
  const data = await res.json().catch(()=>({}));
  if (!res.ok || data.ok === false) {
    status.textContent = data.error || "二维码生成失败";
    return;
  }
  qrSession = data.session || data.sessionId || null;
  currentConnectLink = data.connectLink || data.qrText || data.qrUrl || "";
  if (data.qrImage) {
    document.getElementById("qrImg").src = data.qrImage;
    document.getElementById("qrBox").style.display = "block";
  }
  if (currentConnectLink) showConnectLink(currentConnectLink);
  startQRPoll();
  status.textContent = qrSession ? "等待扫码" : "二维码服务未返回会话";
}

async function cancelQR(){
  if (!qrSession) return;
  await fetch(`${QR_BASE}/cancel?session=${encodeURIComponent(qrSession)}`);
  qrSession = null;
  currentConnectLink = "";
  stopQRPoll();
  document.getElementById("qrStatus").textContent = "已取消";
  document.getElementById("qrBox").style.display = "none";
  document.getElementById("connectLinkPanel").style.display = "none";
}

function startQRPoll(){
  stopQRPoll();
  if (!qrSession) return;
  qrPollTimer = setInterval(pollQRStatus, 2000);
  pollQRStatus().catch(()=>{});
}

function stopQRPoll(){
  if (qrPollTimer) clearInterval(qrPollTimer);
  qrPollTimer = null;
}

async function pollQRStatus(){
  if (!qrSession || !current) return;
  const status = document.getElementById("qrStatus");
  const res = await fetch(`${QR_BASE}/status?session=${encodeURIComponent(qrSession)}`);
  const data = await res.json().catch(()=>({}));
  if (!res.ok || data.status === "not_found") {
    status.textContent = data.error || "扫码会话不存在";
    stopQRPoll();
    return;
  }
  if (data.connectLink) showConnectLink(data.connectLink);
  if (data.qrImage) {
    document.getElementById("qrImg").src = data.qrImage;
    document.getElementById("qrBox").style.display = "block";
  }
  if (data.status === "expired") {
    status.textContent = data.error || "二维码已过期";
    stopQRPoll();
    return;
  }
  if (data.status !== "done") {
    status.textContent = "等待扫码";
    return;
  }
  if (!data.token) {
    status.textContent = "扫码完成但缺少凭证";
    stopQRPoll();
    return;
  }
  await api(`/api/bots/${current.id}/wechat-bind`, {
    method:"POST",
    body:JSON.stringify({
      token:data.token,
      wxUserId:data.wxUserId || data.userId || "",
      baseUrl:data.baseUrl || "https://ilinkai.weixin.qq.com"
    })
  });
  qrSession = null;
  stopQRPoll();
  status.textContent = "微信已绑定";
  await loadWechatStatus();
  await loadBots();
}

async function reconnectWechat(){
  if (!currentConnectLink) {
    await startQR();
  } else {
    showConnectLink(currentConnectLink);
    document.getElementById("qrStatus").textContent = "已生成对接链接";
  }
}

function showConnectLink(link){
  currentConnectLink = link || currentConnectLink;
  if (!currentConnectLink) return;
  document.getElementById("connectLinkInput").value = currentConnectLink;
  document.getElementById("connectLinkPanel").style.display = "block";
}

async function copyConnectLink(){
  const input = document.getElementById("connectLinkInput");
  input.focus();
  input.select();
  try {
    await navigator.clipboard.writeText(input.value);
    document.getElementById("qrStatus").textContent = "链接已复制";
  } catch {
    document.execCommand("copy");
    document.getElementById("qrStatus").textContent = "链接已选中，可手动复制";
  }
}

async function loadWechatStatus(){
  if (!current) return;
  const panel = document.getElementById("wxStatusPanel");
  try {
    const data = await api(`/api/bots/${current.id}/wechat-status`);
    const status = data.status || {};
    panel.innerHTML = `<span class="badge ${status.isBound ? "ok" : ""}">${escapeHtml(status.label || "未绑定")}</span><p class="hint">最后在线：${escapeHtml(status.lastSeenAt || "-")} ${status.lastError ? " / " + escapeHtml(status.lastError) : ""}</p>`;
  } catch(error) {
    panel.textContent = "微信状态加载失败：" + error.message;
  }
}

function escapeHtml(value){ return String(value ?? "").replace(/[&<>"']/g, (char)=>({ "&":"&amp;", "<":"&lt;", ">":"&gt;", '"':"&quot;", "'":"&#039;" }[char])); }
function escapeAttr(value){ return escapeHtml(value).replace(/`/g, "&#096;"); }

Promise.all([loadUsage(), loadBots(), loadPersonaPresets()]).catch((error)=>{ document.body.insertAdjacentHTML("beforeend", `<p class="hint">${escapeHtml(error.message)}</p>`); });
</script>
</body>
