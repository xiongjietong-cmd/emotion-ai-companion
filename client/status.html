<!DOCTYPE html>
<html lang="zh">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Service Status</title><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:monospace;background:#1a1a2e;color:#e0e0e0;padding:40px}h1{color:#667eea;margin-bottom:20px}.svc{display:flex;justify-content:space-between;padding:12px 16px;margin:8px 0;background:#16213e;border-radius:8px;align-items:center}.up{color:#22c55e}.down{color:#ef4444}.dot{width:10px;height:10px;border-radius:50%;display:inline-block;margin-right:8px}.dot.up{background:#22c55e}.dot.down{background:#ef4444}</style></head><body><h1>Emotion AI Status</h1><div id="s"></div><script>async function check(){const r=await Promise.all([fetch("/api/health").then(r=>r.json()).catch(()=>({ok:false})),fetch("http://localhost:3002/status?session=x").then(()=>({up:true})).catch(()=>({up:false}))]);document.getElementById("s").innerHTML='<div class="svc"><span><span class="dot '+(r[0].ok?"up":"down")+'"></span>SaaS API</span><span class="'+(r[0].ok?"up":"down")+'">'+(r[0].ok?"Online":"Offline")+'</span></div><div class="svc"><span><span class="dot '+(r[1].up?"up":"down")+'"></span>QR Server</span><span class="'+(r[1].up?"up":"down")+'">'+(r[1].up?"Online":"Offline")+'</span></div>'}check();setInterval(check,10000)</script></body></html>
