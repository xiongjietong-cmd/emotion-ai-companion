<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>管理面板</title>
<style>
:root{--primary:#6366f1;--bg:#f8fafc;--card:#fff;--text:#1e293b;--sub:#94a3b8;--shadow:0 1px 3px rgba(0,0,0,.06)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"Inter",-apple-system,sans-serif;background:var(--bg);color:var(--text)}
nav{background:var(--card);border-bottom:1px solid #e2e8f0;padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:56px}
nav h1{font-size:18px;font-weight:600;color:var(--primary)}
nav a{color:var(--sub);text-decoration:none;font-size:14px}
.main{max-width:1100px;margin:0 auto;padding:24px 16px}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px;margin-bottom:24px}
.stat{background:var(--card);border-radius:12px;padding:24px;text-align:center;box-shadow:var(--shadow);border:1px solid #e2e8f0}
.stat .num{font-size:42px;font-weight:700;color:var(--primary)}
.stat .label{font-size:13px;color:var(--sub);margin-top:4px}
.card{background:var(--card);border-radius:12px;padding:24px;box-shadow:var(--shadow);border:1px solid #e2e8f0;margin-bottom:16px}
.card h2{font-size:16px;margin-bottom:16px}
table{width:100%;border-collapse:collapse}
th,td{text-align:left;padding:12px 16px;border-bottom:1px solid #f1f5f9;font-size:14px}
th{color:var(--sub);font-weight:500;font-size:12px;text-transform:uppercase}
tr:hover{background:#f8fafc}
.badge{display:inline-block;padding:2px 10px;border-radius:12px;font-size:11px;font-weight:500}
.badge-green{background:#dcfce7;color:#166534}
.badge-red{background:#fef2f2;color:#991b1b}
.badge-gray{background:#f1f5f9;color:#64748b}
.empty{text-align:center;color:var(--sub);padding:60px;font-size:15px}
</style>
</head>
<body>
<nav><h1>📊 管理面板</h1><div><a href="/dashboard.html">用户后台</a><span style="color:#cbd5e1;margin:0 12px">|</span><a href="/">首页</a></div></nav>
<div class="main" id="app"><div class="empty">加载中...</div></div>
<script>
const T=localStorage.getItem("token");if(!T)location="/";
(async function(){
const r=await fetch("/api/admin/stats",{headers:{Authorization:"Bearer "+T}});
const d=await r.json();
if(!d.ok){location="/";return}
const s=d.stats;
document.getElementById("app").innerHTML=
`<div class="stats">
<div class="stat"><div class="num">${s.userCount}</div><div class="label">注册用户</div></div>
<div class="stat"><div class="num">${s.botCount}</div><div class="label">机器人总数</div></div>
<div class="stat"><div class="num">${s.msgCount}</div><div class="label">消息总数</div></div>
<div class="stat"><div class="num">${s.wechatCount}</div><div class="label">微信在线</div></div>
<div class="stat"><div class="num">${s.todayMsgs}</div><div class="label">今日消息</div></div>
</div>
<div class="card"><h2>用户列表</h2><table><tr><th>ID</th><th>邮箱</th><th>角色</th><th>注册时间</th></tr>${d.users.map(u=>`<tr><td>${u.id}</td><td>${u.email}</td><td>${u.role==='admin'?'<span class="badge badge-green">管理员</span>':'<span class="badge badge-gray">用户</span>'}</td><td>${(u.created_at||'').slice(0,10)}</td></tr>`).join('')}</table></div>
<div class="card"><h2>机器人列表</h2><table><tr><th>ID</th><th>名称</th><th>所有者</th><th>状态</th><th>微信</th></tr>${d.bots.map(b=>`<tr><td>${b.id}</td><td>${b.name}</td><td>${b.owner}</td><td>${b.active?'<span class="badge badge-green">运行中</span>':'<span class="badge badge-red">已停用</span>'}</td><td>${b.hasWechat?'<span class="badge badge-green">已绑定</span>':'<span class="badge badge-gray">未绑定</span>'}</td></tr>`).join('')}</table></div>`;
})();
</script>
</body>
</html>
